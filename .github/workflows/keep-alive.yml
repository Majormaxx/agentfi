name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"   # every 14 minutes — Render sleeps after 15 min idle
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -sf https://agentfi-uoni.onrender.com/health \
            && echo "Backend alive" \
            || echo "Backend starting up (cold start)"
