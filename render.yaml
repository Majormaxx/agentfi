services:
  - type: web
    name: agentfi-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: node_modules/.bin/tsx server/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: STELLAR_NETWORK
        value: testnet
      - key: SOROBAN_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_HORIZON_URL
        value: https://horizon-testnet.stellar.org
      - key: DATABASE_PATH
        value: /tmp/agentfi.db
      # Set these manually in the Render dashboard (sensitive):
      # AGENTFI_STELLAR_ADDRESS
      # AGENTFI_STELLAR_SECRET
      # PRIVY_APP_ID
      # PRIVY_APP_SECRET
      # SOROSWAP_API_KEY
      # DEFINDEX_API_KEY
      # GROQ_API_KEY
      # AGENT_ACCOUNT_CONTRACT_ID
      # DEFINDEX_VAULT_USDC_ADDRESS
      # DEFINDEX_VAULT_XLM_ADDRESS
